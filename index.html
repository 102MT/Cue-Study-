<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Flashcards</title>
  <style>
    :root { --w: 720px; }
    body {
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Noto Sans KR", Arial, sans-serif;
      margin: 0; padding: 24px;
      background: #f6f7fb;
      color: #111;
      display: flex; justify-content: center;
    }
    .wrap { width: min(var(--w), 100%); }
    header { display: flex; gap: 12px; align-items: baseline; flex-wrap: wrap; }
    h1 { font-size: 20px; margin: 0; }
    .meta { font-size: 13px; color: #555; }
    .card {
      margin-top: 16px;
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.08);
      padding: 22px;
      min-height: 180px;
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 14px;
      user-select: none;
    }
    .face { font-size: 14px; color: #666; }
    .content { font-size: 20px; line-height: 1.45; white-space: pre-wrap; }
    .controls {
      display: flex; gap: 10px; flex-wrap: wrap;
      margin-top: 14px;
    }
    button {
      border: 0; border-radius: 12px;
      padding: 10px 14px;
      background: #111; color: #fff;
      cursor: pointer;
      font-size: 14px;
    }
    button.secondary { background: #e9ecf5; color: #111; }
    button:active { transform: translateY(1px); }
    .row { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 10px; }
    input[type="file"] { display: none; }
    label.filebtn {
      display: inline-flex; align-items: center; gap: 8px;
      border-radius: 12px; padding: 10px 14px;
      background: #e9ecf5; cursor: pointer; font-size: 14px;
    }
    .hint { font-size: 12px; color: #666; margin-top: 10px; }
    .kbd { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
           background: #eef1f7; padding: 2px 6px; border-radius: 6px; }
    textarea {
      width: 100%;
      margin-top: 14px;
      border-radius: 12px;
      border: 1px solid #d9ddea;
      padding: 12px;
      min-height: 120px;
      font-size: 14px;
      resize: vertical;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>큐카드</h1>
      <div class="meta" id="meta"></div>
    </header>

    <div class="card" id="card" title="클릭 또는 Space로 뒤집기">
      <div class="face" id="face">앞면</div>
      <div class="content" id="content"></div>
      <div class="meta" id="progress"></div>
    </div>

    <div class="controls">
      <button class="secondary" id="prev">← 이전 (←)</button>
      <button id="flip">뒤집기 (Space)</button>
      <button class="secondary" id="next">다음 (→)</button>
      <button class="secondary" id="shuffle">섞기</button>
      <button class="secondary" id="reset">리셋</button>
    </div>

    <div class="row">
      <label class="filebtn" for="file">📄 카드 불러오기(JSON)</label>
      <input id="file" type="file" accept="application/json" />
      <button class="secondary" id="download">현재 카드 JSON 저장</button>
    </div>

    <div class="hint">
      단축키: <span class="kbd">Space</span> 뒤집기 · <span class="kbd">←</span>/<span class="kbd">→</span> 이동 · <span class="kbd">S</span> 섞기 · <span class="kbd">R</span> 리셋
      <br/>
      아래 텍스트를 직접 수정해 카드 내용을 바꿀 수도 있어요(형식: <span class="kbd">앞면 || 뒷면</span> 한 줄당 1장).
    </div>

    <textarea id="editor" spellcheck="false"></textarea>
    <div class="controls">
      <button class="secondary" id="apply">텍스트 → 카드 적용</button>
    </div>
  </div>

<script>
(() => {
  // 기본 카드(원하면 텍스트 편집 후 "적용" 누르기)
  let cards = [
    { front: "중심극한정리란?", back: "표본 크기가 충분히 크면 모집단 분포와 무관하게\\n표본평균의 분포는 정규분포에 근사한다." },
    { front: "표본평균의 분산 공식은?", back: "Var(X̄) = σ² / n" },
    { front: "Z=1.96이 의미하는 신뢰수준은?", back: "약 95% (양측 기준)" }
  ];

  let order = [];
  let idx = 0;
  let isBack = false;

  const $ = (id) => document.getElementById(id);
  const meta = $("meta"), face = $("face"), content = $("content"), progress = $("progress");
  const cardEl = $("card");

  function rebuildOrder() {
    order = cards.map((_, i) => i);
    idx = 0;
    isBack = false;
    render();
    syncEditor();
  }

  function render() {
    if (!cards.length) {
      face.textContent = "정보";
      content.textContent = "카드가 없습니다. 아래 텍스트로 카드를 추가하거나 JSON을 불러오세요.";
      progress.textContent = "";
      meta.textContent = "";
      return;
    }
    const c = cards[order[idx]];
    face.textContent = isBack ? "뒷면" : "앞면";
    content.textContent = isBack ? c.back : c.front;
    progress.textContent = `${idx + 1} / ${cards.length}`;
    meta.textContent = `카드 ${cards.length}장`;
  }

  function flip() { isBack = !isBack; render(); }
  function next() { if (!cards.length) return; idx = (idx + 1) % cards.length; isBack = false; render(); }
  function prev() { if (!cards.length) return; idx = (idx - 1 + cards.length) % cards.length; isBack = false; render(); }

  function shuffle() {
    // Fisher–Yates shuffle
    for (let i = order.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [order[i], order[j]] = [order[j], order[i]];
    }
    idx = 0; isBack = false; render();
  }

  function reset() { rebuildOrder(); }

  // Text editor: "front || back" per line
  function syncEditor() {
    const lines = cards.map(c => `${c.front} || ${c.back.replaceAll("\n","\\n")}`);
    $("editor").value = lines.join("\n");
  }

  function applyFromEditor() {
    const raw = $("editor").value.trim();
    if (!raw) { cards = []; rebuildOrder(); return; }
    const lines = raw.split(/\r?\n/);
    const parsed = [];
    for (const line of lines) {
      const t = line.trim();
      if (!t) continue;
      const parts = t.split("||");
      if (parts.length < 2) continue;
      const f = parts[0].trim();
      const b = parts.slice(1).join("||").trim().replaceAll("\\n","\n");
      parsed.push({ front: f, back: b });
    }
    cards = parsed;
    rebuildOrder();
  }

  // JSON load/save
  function loadJSON(file) {
    const reader = new FileReader();
    reader.onload = () => {
      try {
        const data = JSON.parse(reader.result);
        if (!Array.isArray(data)) throw new Error("JSON은 배열이어야 합니다.");
        const normalized = data.map(x => ({
          front: String(x.front ?? ""),
          back: String(x.back ?? "")
        })).filter(x => x.front || x.back);
        cards = normalized;
        rebuildOrder();
      } catch (e) {
        alert("불러오기 실패: " + e.message);
      }
    };
    reader.readAsText(file);
  }

  function downloadJSON() {
    const blob = new Blob([JSON.stringify(cards, null, 2)], { type: "application/json" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "flashcards.json";
    a.click();
    URL.revokeObjectURL(a.href);
  }

  // Bind UI
  $("flip").onclick = flip;
  $("next").onclick = next;
  $("prev").onclick = prev;
  $("shuffle").onclick = shuffle;
  $("reset").onclick = reset;
  $("apply").onclick = applyFromEditor;

  cardEl.addEventListener("click", flip);

  $("file").addEventListener("change", (e) => {
    const f = e.target.files?.[0];
    if (f) loadJSON(f);
    e.target.value = "";
  });

  $("download").onclick = downloadJSON;

  // Keyboard shortcuts
  window.addEventListener("keydown", (e) => {
    if (e.code === "Space") { e.preventDefault(); flip(); }
    else if (e.key === "ArrowRight") next();
    else if (e.key === "ArrowLeft") prev();
    else if (e.key.toLowerCase() === "s") shuffle();
    else if (e.key.toLowerCase() === "r") reset();
  });

  // init
  rebuildOrder();
})();
</script>
</body>
</html>
